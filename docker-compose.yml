version: "3.9"

services:
  app:
    build: ./app
    container_name: debug-app
    ports:
      - "5000:5000"
      #- "8080:80"
    volumes:
      - ./logs/app.log:/var/log/debug-app/app.log

  nginx:
    image: nginx:latest
    container_name: debug-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app